<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>登录</title></head>
<body>
<h2>系统登录</h2>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<form method="post" action="/login">
  <label>用户名</label><input name="username" required><br>
  <label>密码</label><input type="password" name="password" required><br>
  <label>验证码</label><span>{{ challenge }}</span><br>
  <input type="hidden" name="captcha_key" value="{{ captcha_key }}">
  <input name="captcha_answer" required><br>
  <button type="submit">登录</button>
</form>
</body></html>
