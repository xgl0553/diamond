<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>角色管理</title></head><body>
<h2>角色管理</h2>
<a href="/admin/users">返回用户管理</a>
{% if message %}<p>{{ message }}</p>{% endif %}
<form method="post" action="/admin/roles/create">
  <input name="role_code" placeholder="角色编码" required>
  <input name="role_name" placeholder="角色名称" required>
  <button type="submit">创建角色</button>
</form>
{% for r in roles %}
<h3>{{ r.role_name }} ({{ r.role_code }})</h3>
<ul>
{% for p in perms %}
<li>
<form method="post" action="/admin/roles/{{r.id}}/toggle-perm">
<input type="hidden" name="permission_id" value="{{p.id}}">
{{ p.perm_code }}
<button type="submit">{% if (r.id, p.id) in mappings %}移除{% else %}授予{% endif %}</button>
</form>
</li>
{% endfor %}
</ul>
{% endfor %}
</body></html>
